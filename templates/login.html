{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper container">
    <div class="glass-container auth-form-container login-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to continue your impact.</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="{{ email or '' }}" required class="form-control" placeholder="you@domain.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required class="form-control">
                    <i class="fa-solid fa-eye password-toggle" onclick="toggleVisibility('password', this)"></i>
                </div>
            </div>

            <script>
                function toggleVisibility(id, icon) {
                    const input = document.getElementById(id);
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                        
                        input.addEventListener('click', function hideOnClick() {
                            if (input.type === 'text') {
                                input.type = 'password';
                                icon.classList.remove('fa-eye-slash');
                                icon.classList.add('fa-eye');
                                
                                setTimeout(() => {
                                    input.setSelectionRange(input.value.length, input.value.length);
                                }, 0);
                            }
                            input.removeEventListener('click', hideOnClick);
                        });
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                }
            </script>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a>.</p>
    </div>
</div>
{% endblock %}
