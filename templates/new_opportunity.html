{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper container">
    <div class="glass-container auth-form-container login-container">
        <h2>Post New Opportunity</h2>
        <p class="subtitle">Tell volunteers what you need.</p>
        
        <form method="POST" action="{{ url_for('new_opportunity') }}">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required class="form-control" placeholder="e.g. Weekend Math Tutor">
            </div>

            <div class="form-group">
                <label for="description">Detailed Description</label>
                <textarea id="description" name="description" required class="form-control" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="skills_required">Skills Required (Comma separated)</label>
                <input type="text" id="skills_required" name="skills_required" class="form-control" placeholder="e.g. Teaching, Math">
            </div>
            
            <div class="form-group">
                <label for="duration">Duration / Schedule</label>
                <input type="text" id="duration" name="duration" class="form-control" placeholder="e.g. 2 hours/week, Oct 1st - Nov 1st">
            </div>

            <div class="form-group">
                <label for="location">Location (Local or Remote)</label>
                <input type="text" id="location" name="location" class="form-control" placeholder="e.g. Community Center or Remote">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Post Opportunity</button>
        </form>
        <p class="auth-footer"><a href="{{ url_for('ngo_dashboard') }}">Back to Dashboard</a>.</p>
    </div>
</div>
{% endblock %}
