{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper container">
    <div class="glass-container auth-form-container login-container">
        <div style="margin-bottom: 1rem;">
            <a href="{{ url_for('ngo_dashboard') }}" style="text-decoration: none; color: var(--primary); font-weight: 500;">&larr; Back to Dashboard</a>
        </div>

        <h2>Edit Opportunity</h2>
        <p class="subtitle">Update the details of your opportunity.</p>
        
        <form method="POST" action="{{ url_for('edit_opportunity', opp_id=opp.id) }}">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required class="form-control" value="{{ opp.title }}">
            </div>

            <div class="form-group">
                <label for="description">Detailed Description</label>
                <textarea id="description" name="description" required class="form-control" rows="4">{{ opp.description }}</textarea>
            </div>

            <div class="form-group">
                <label for="skills_required">Skills Required (Comma separated)</label>
                <input type="text" id="skills_required" name="skills_required" class="form-control" value="{{ opp.skills_required }}">
            </div>
            
            <div class="form-group">
                <label for="duration">Duration / Schedule</label>
                <input type="text" id="duration" name="duration" class="form-control" value="{{ opp.duration }}">
            </div>

            <div class="form-group">
                <label for="location">Location (Local or Remote)</label>
                <input type="text" id="location" name="location" class="form-control" value="{{ opp.location }}">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Update Opportunity</button>
        </form>
    </div>
</div>
{% endblock %}
